<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Miner Reference — Fixture Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #1a1a1f;
      color: #ddd;
      font-family: -apple-system, system-ui, sans-serif;
      overflow: hidden;
    }
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #picker {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.65);
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
    }
    #picker label { color: #aaa; margin-right: 6px; }
    #picker select {
      background: #2a2a30;
      color: #fff;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    #picker select:focus { outline: 1px solid #6688ff; }
    #picker button {
      background: #3a5a3a;
      color: #fff;
      border: 1px solid #4a7a4a;
      border-radius: 4px;
      padding: 4px 10px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      margin-left: 8px;
    }
    #picker button:hover { background: #4a7a4a; }
    #results-nav {
      display: inline-flex;
      align-items: center;
      margin-left: 10px;
      gap: 4px;
    }
    #results-nav button {
      background: #2a3a5a;
      border-color: #4466aa;
      padding: 4px 8px;
      font-size: 11px;
    }
    #results-nav button:hover { background: #3a4a6a; }
    #results-nav button:disabled { opacity: 0.3; cursor: default; }
    #results-counter { color: #aaa; font-size: 11px; min-width: 60px; text-align: center; }
    #info {
      position: absolute;
      top: 64px;
      left: 12px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      pointer-events: none;
    }
    #info b { color: #fff; }
    #info code {
      background: rgba(255, 255, 255, 0.1);
      padding: 1px 5px;
      border-radius: 3px;
    }
    #error {
      position: absolute;
      top: 12px;
      right: 12px;
      max-width: 480px;
      padding: 10px 14px;
      background: rgba(140, 20, 20, 0.85);
      color: #fff;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
      white-space: pre-wrap;
    }
    #drop-overlay {
      position: fixed;
      inset: 0;
      background: rgba(60, 80, 200, 0.25);
      border: 3px dashed rgba(100, 140, 255, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
    }
    #drop-overlay span {
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="picker">
    <select id="fixture-select"></select>
    <button id="refresh-btn" title="Refresh results/">↻</button>
    <span id="results-nav">
      <button id="prev-result" disabled>◀</button>
      <span id="results-counter"></span>
      <button id="next-result" disabled>▶</button>
    </span>
  </div>

  <div id="info">
    <b>Miner Reference — Fixture Viewer</b><br/>
    <span id="loaded-from"></span><br/>
    Drag to orbit · scroll to zoom · ← → navigate<br/>
    <span id="stats"></span>
  </div>

  <div id="error"></div>
  <div id="drop-overlay"><span>Drop .js fixture</span></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const errorEl = document.getElementById('error');
    const statsEl = document.getElementById('stats');
    const loadedFromEl = document.getElementById('loaded-from');
    const selectEl = document.getElementById('fixture-select');

    function showError(message) {
      errorEl.style.display = 'block';
      errorEl.textContent = message;
      console.error(message);
    }

    function clearError() {
      errorEl.style.display = 'none';
      errorEl.textContent = '';
    }

    // ----- Scene, camera, lighting (set up once) -----

    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight, false);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1f);

    // FOV matches the runtime spec (17.5°). Position kept at the same direction
    // and distance as the canonical render camera (3.5 from origin).
    const camera = new THREE.PerspectiveCamera(17.5, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(2.4, 1.6, 2.8);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    // PBR-friendly lighting
    scene.add(new THREE.HemisphereLight(0xffffff, 0x222233, 0.6));

    const key = new THREE.DirectionalLight(0xffffff, 1.6);
    key.position.set(3, 4, 2);
    scene.add(key);

    const fill = new THREE.DirectionalLight(0xaaccff, 0.4);
    fill.position.set(-2, 2, -3);
    scene.add(fill);

    // Reference helpers — unit cube wireframe (the [-0.5, 0.5] valid region) and origin axes
    const unitBox = new THREE.Box3Helper(
      new THREE.Box3(new THREE.Vector3(-0.5, -0.5, -0.5), new THREE.Vector3(0.5, 0.5, 0.5)),
      0x444466,
    );
    scene.add(unitBox);

    const axes = new THREE.AxesHelper(0.65);
    scene.add(axes);

    // ----- Fixture loading (called on initial load and on dropdown change) -----

    let currentFixtureRoot = null;

    function prepareLoad(label) {
      clearError();
      statsEl.innerHTML = '<br/><i>loading…</i>';
      loadedFromEl.innerHTML = `Loaded from <code>${label}</code>`;

      if (currentFixtureRoot) {
        scene.remove(currentFixtureRoot);
        disposeObject(currentFixtureRoot);
        currentFixtureRoot = null;
      }
    }

    function runGenerate(generate, label) {
      const t0 = performance.now();
      const root = generate(THREE);
      const elapsed = performance.now() - t0;

      if (!root || !root.isObject3D) {
        throw new Error('generate() did not return a Three.js Object3D');
      }

      scene.add(root);
      currentFixtureRoot = root;
      updateStats(root, elapsed);
    }

    async function loadFixture(url) {
      prepareLoad(url);
      try {
        // File URLs need cache-busting so re-selecting the same dropdown entry
        // re-evaluates the fixture (handy during iteration). Blob URLs are
        // already unique per createObjectURL call, and the browser resolves
        // them by exact URL — appending ?t=... makes the blob unreachable.
        const importUrl = url.startsWith('blob:') ? url : `${url}?t=${Date.now()}`;
        const module = await import(importUrl);
        const generate = module.default;
        if (typeof generate !== 'function') {
          throw new Error(`${url} does not have a default export function`);
        }
        runGenerate(generate, url);
      } catch (err) {
        statsEl.innerHTML = '';
        showError(`Failed to load ${url}:\n${err.stack || err.message || err}`);
      }
    }

    function updateStats(root, elapsedMs) {
      // Mirror the validator's auto-wrap rule: a bare Mesh / LineSegments /
      // Points / InstancedMesh return is wrapped in a Group before
      // measurement, so `maxDepth` reports 1 (Group wrapper at 0, mesh at 1)
      // instead of 0. This keeps the viewer HUD consistent with what
      // `node tools/validate.js` reports for the same fixture. See
      // Output Spec § Return Value and validator/src/postValidation.js.
      //
      // We simulate the wrap by starting the walk at `startDepth = 1` for
      // bare roots instead of actually parenting `root` under a new Group.
      // A real wrap would call `wrapper.add(root)`, which reparents `root`
      // and removes it from the scene — invisible rendering. The depth
      // offset produces the same `maxDepth` value without touching the
      // scene graph. All other metrics (vertex count, draw calls,
      // instances, bounding box) are unaffected because an identity-wrap
      // Group contributes nothing to any of them.
      const isBareRoot = root.type !== 'Group';
      const startDepth = isBareRoot ? 1 : 0;

      let vertexCount = 0;
      let drawCalls = 0;
      let maxDepth = startDepth;
      let instances = 0;

      function walk(node, depth) {
        if (depth > maxDepth) maxDepth = depth;
        if (node.isMesh || node.isLine || node.isPoints) {
          drawCalls++;
          if (node.geometry?.attributes?.position) {
            vertexCount += node.geometry.attributes.position.count;
          }
          if (node.isInstancedMesh) {
            instances += node.count ?? 0;
          }
        }
        for (const child of node.children) walk(child, depth + 1);
      }
      walk(root, startDepth);

      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const fits =
        box.min.x >= -0.5 && box.max.x <= 0.5 &&
        box.min.y >= -0.5 && box.max.y <= 0.5 &&
        box.min.z >= -0.5 && box.max.z <= 0.5;

      statsEl.innerHTML =
        `<br/>generate(): <b>${elapsedMs.toFixed(1)} ms</b>` +
        `<br/>vertices: <b>${vertexCount}</b> / 250,000` +
        `<br/>draw calls: <b>${drawCalls}</b> / 200` +
        `<br/>scene depth: <b>${maxDepth}</b> / 32` +
        `<br/>instances: <b>${instances}</b> / 50,000` +
        `<br/>bounds: <b>${fits ? 'fits unit cube ✓' : 'OUT OF BOUNDS ✗'}</b>` +
        `<br/>size: ${size.x.toFixed(3)} × ${size.y.toFixed(3)} × ${size.z.toFixed(3)}` +
        `<br/>center: (${center.x.toFixed(3)}, ${center.y.toFixed(3)}, ${center.z.toFixed(3)})`;
    }

    function disposeObject(obj) {
      obj.traverse((node) => {
        if (node.geometry) node.geometry.dispose?.();
        if (node.material) {
          const mats = Array.isArray(node.material) ? node.material : [node.material];
          for (const m of mats) m?.dispose?.();
        }
      });
    }

    // ----- results/ auto-loading -----

    const prevBtn = document.getElementById('prev-result');
    const nextBtn = document.getElementById('next-result');
    const counterEl = document.getElementById('results-counter');
    const refreshBtn = document.getElementById('refresh-btn');

    async function scanResults() {
      selectEl.innerHTML = '';
      try {
        const res = await fetch('./results.json?t=' + Date.now());
        if (!res.ok) throw new Error(`results.json: ${res.status}`);
        const files = await res.json();
        if (!files.length) {
          showError('results.json is empty — run tests first');
          return;
        }
        for (const name of files) {
          const opt = document.createElement('option');
          opt.value = `./results/${name}`;
          opt.textContent = name;
          selectEl.appendChild(opt);
        }
        selectEl.value = selectEl.options[0].value;
        await loadFixture(selectEl.value);
        updateNav();
      } catch (err) {
        showError(`Cannot load results.json\n${err.message}\n\nRun: python3 gen_results.py`);
      }
    }

    function currentIdx() {
      return [...selectEl.options].findIndex(o => o.value === selectEl.value);
    }

    function updateNav() {
      const idx = currentIdx();
      const total = selectEl.options.length;
      prevBtn.disabled = idx <= 0;
      nextBtn.disabled = idx >= total - 1;
      counterEl.textContent = total > 0 ? `${idx + 1} / ${total}` : '';
    }

    function navigate(delta) {
      const idx = currentIdx() + delta;
      if (idx >= 0 && idx < selectEl.options.length) {
        selectEl.value = selectEl.options[idx].value;
        loadFixture(selectEl.value);
        updateNav();
      }
    }

    selectEl.addEventListener('change', () => {
      loadFixture(selectEl.value);
      updateNav();
    });

    prevBtn.addEventListener('click', () => navigate(-1));
    nextBtn.addEventListener('click', () => navigate(1));
    refreshBtn.addEventListener('click', () => scanResults());

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' && !prevBtn.disabled) prevBtn.click();
      if (e.key === 'ArrowRight' && !nextBtn.disabled) nextBtn.click();
    });

    // Drag-and-drop .js files

    const dropOverlay = document.getElementById('drop-overlay');
    let dragCounter = 0;

    document.addEventListener('dragenter', (e) => {
      e.preventDefault();
      dragCounter++;
      dropOverlay.style.display = 'flex';
    });

    document.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dragCounter--;
      if (dragCounter <= 0) {
        dragCounter = 0;
        dropOverlay.style.display = 'none';
      }
    });

    document.addEventListener('dragover', (e) => {
      e.preventDefault();
    });

    document.addEventListener('drop', async (e) => {
      e.preventDefault();
      dragCounter = 0;
      dropOverlay.style.display = 'none';

      const file = [...e.dataTransfer.files].find(f => f.name.endsWith('.js'));
      if (!file) {
        showError('Please drop a .js file');
        return;
      }

      // Load the dropped source as a real ES module via a blob URL, not by
      // rewriting the source string. This routes drag-and-drop through the
      // same dynamic import() path as the dropdown fixtures, so the browser's
      // native parser handles `export default` correctly regardless of what
      // appears in comments, strings, or elsewhere in the file.
      const source = await file.text();
      const blobUrl = URL.createObjectURL(
        new Blob([source], { type: 'application/javascript' }),
      );

      // Reuse the single "dropped" option slot in the dropdown. Revoke the
      // previous blob URL before overwriting so memory doesn't leak across
      // repeated drops.
      const label = `${file.name}  (dropped)`;
      let opt = selectEl.querySelector('option[data-dropped]');
      if (!opt) {
        opt = document.createElement('option');
        opt.setAttribute('data-dropped', '');
        selectEl.prepend(opt);
      } else if (opt.value && opt.value.startsWith('blob:')) {
        URL.revokeObjectURL(opt.value);
      }
      opt.value = blobUrl;
      opt.textContent = label;
      selectEl.value = blobUrl;

      loadFixture(blobUrl);
    });

    // Auto-load results/ on startup
    await scanResults();

    // ----- Render loop -----

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight, false);
    }
    window.addEventListener('resize', onResize);

    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
